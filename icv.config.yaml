# Interactive CV configuration (Option B)
# Edit this file in the GitHub web UI to personalise your CV.

# ────────────────────────────────────────────────────────────────
# Visual
# ────────────────────────────────────────────────────────────────

theme: "auto"          # light | dark | auto
charts: "chartjs"       # chartjs | apex | d3

# ────────────────────────────────────────────────────────────────
# Data sources (fill in the account IDs you want to show)
# ────────────────────────────────────────────────────────────────

sources:
  orcid: "0000-0001-5944-9960"
  github: "AlexanderPico"
  semantic_scholar: "2148817073"

# ────────────────────────────────────────────────────────────────
# Page layout – Each tab becomes a route (/overview, /cv, …)
# ────────────────────────────────────────────────────────────────

tabs:
  - id: overview        # URL slug and internal key
    label: Overview
    icon: "🏠"            # optional emoji or icon name
    components:
      - profile_card
      - quick_stats
      - github_heatmap

  - id: cv
    label: Experience
    components:
      - experience_timeline
      - skills_radar

  - id: publications
    label: Publications
    components:
      - citation_chart
      - publications_table
      - coauthor_network

  - id: stats
    label: Stats
    components:
      - github_heatmap
      - citation_chart

# ────────────────────────────────────────────────────────────────
# Automation
# ────────────────────────────────────────────────────────────────

auto_refresh: "monthly"   # none | daily | weekly | monthly 